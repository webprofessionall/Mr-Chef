<!--
  DESIGN TOKENS
  Color  — ink #102A3D (harbour-night blue, dark base) · paper #F7EFE1 (order-ticket cream)
           paper-line #E3D2AC (dotted leader) · ember #D9622B (wood-fire terracotta, signature accent)
           olive #6E7B3E (herb green, secondary accent) · char #1C1A16 (ticket ink)
  Type   — Display: Fraunces (italic, warm/characterful) · Body: Work Sans · Ticket/price: Space Mono
  Layout — Hero (real terrace photo) → two physical "menus" (Food / Drinks) flipped via tabs,
           each item rendered as a kitchen-order-ticket row with a torn paper edge.
  Signature — the whole menu behaves like the restaurant's own laminated order pad: dotted
           leader lines, perforated ticket tops, mono prices — built from their actual two menus.
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500;1,9..144,600&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#102A3D;
    --ink-2:#173B52;
    --ink-3:#0B1F2D;
    --paper:#F7EFE1;
    --paper-2:#FBF6EA;
    --paper-line:#D8C39A;
    --ember:#D9622B;
    --ember-dark:#B84B1B;
    --olive:#6E7B3E;
    --char:#1C1A16;
    --cream:#FBF6EC;
    --shadow: 0 10px 30px rgba(16,42,61,0.18);
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--char);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  img{max-width:100%; display:block;}
  a{color:inherit;}

  h1,h2,h3{ font-family:'Fraunces', serif; margin:0; }

  .visually-hidden{
    position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0);
  }

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 22px;
    background:var(--ink);
    color:var(--cream);
    border-bottom:3px solid var(--ember);
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    font-family:'Fraunces', serif; font-style:italic; font-weight:600;
    font-size:1.3rem; letter-spacing:0.01em;
  }
  .brand svg{ width:26px; height:26px; flex-shrink:0; }
  .lang-toggle{
    display:flex; border:1.5px solid var(--cream); border-radius:999px; overflow:hidden;
    font-family:'Space Mono', monospace; font-size:0.78rem;
  }
  .lang-toggle button{
    background:transparent; color:var(--cream); border:none; cursor:pointer;
    padding:7px 14px; font-family:inherit; font-size:inherit; letter-spacing:0.04em;
    transition:background .2s ease, color .2s ease;
  }
  .lang-toggle button.active{ background:var(--ember); color:var(--cream); }

  /* ---------- Hero ---------- */
  .hero{
    position:relative;
    display:grid;
    grid-template-columns:1.05fr 1fr;
    min-height:70vh;
    background:var(--ink);
    color:var(--cream);
  }
  .hero-inner{
    padding:56px 44px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }
  .hero-photo{
    position:relative;
    overflow:hidden;
    min-height:340px;
  }
  .hero-photo img{
    width:100%; height:100%;
    object-fit:cover;
    object-position:left 38%;
    display:block;
  }
  .hero-photo::before{
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(90deg, rgba(16,42,61,0.45) 0%, rgba(16,42,61,0) 14%);
    pointer-events:none;
  }
  .hero-photo-tag{
    position:absolute; left:18px; bottom:18px;
    background:var(--ember); color:var(--cream);
    font-family:'Space Mono', monospace; font-size:0.72rem; letter-spacing:0.04em;
    padding:7px 12px; border-radius:3px;
    box-shadow:var(--shadow);
  }
  @media (max-width:860px){
    .hero{ grid-template-columns:1fr; min-height:auto; }
    .hero-photo{ min-height:260px; }
    .hero-inner{ padding:44px 24px 32px; }
  }
  .hero-eyebrow{
    font-family:'Space Mono', monospace;
    font-size:0.78rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:#F2C9A6;
    margin-bottom:10px;
    opacity:0;
    animation:rise .7s ease-out .1s forwards;
  }
  .hero h1{
    font-style:italic;
    font-weight:600;
    font-size:clamp(2.6rem, 8vw, 5.2rem);
    line-height:0.98;
    margin-bottom:14px;
    opacity:0;
    animation:rise .8s ease-out .25s forwards;
  }
  .hero p{
    max-width:540px;
    font-size:1.05rem;
    line-height:1.55;
    color:#EDE2D0;
    margin-bottom:22px;
    opacity:0;
    animation:rise .8s ease-out .4s forwards;
  }
  .hero-cta{
    display:flex; flex-wrap:wrap; gap:12px;
    opacity:0;
    animation:rise .8s ease-out .55s forwards;
  }
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    font-family:'Space Mono', monospace; font-size:0.85rem; letter-spacing:0.03em;
    padding:13px 22px;
    border-radius:3px;
    text-decoration:none;
    cursor:pointer;
    border:1.5px solid transparent;
    transition:transform .15s ease, background .2s ease, color .2s ease;
  }
  .btn-primary{ background:var(--ember); color:var(--cream); }
  .btn-primary:hover{ background:var(--ember-dark); transform:translateY(-2px); }
  .btn-ghost{ background:transparent; color:var(--cream); border-color:rgba(251,246,236,0.55); }
  .btn-ghost:hover{ background:rgba(251,246,236,0.12); transform:translateY(-2px); }

  @keyframes rise{
    from{ opacity:0; transform:translateY(16px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* ---------- Intro strip ---------- */
  .intro{
    background:var(--ink);
    color:var(--cream);
    padding:34px 24px 44px;
  }
  .intro-inner{
    max-width:1100px; margin:0 auto;
    display:grid; grid-template-columns:repeat(3,1fr); gap:24px;
  }
  .intro-item{ border-top:2px solid var(--ember); padding-top:12px; }
  .intro-item h3{ font-size:0.95rem; font-family:'Space Mono',monospace; letter-spacing:0.04em; color:#F2C9A6; margin-bottom:6px; text-transform:uppercase;}
  .intro-item p{ margin:0; font-size:0.92rem; line-height:1.5; color:#D9E1E6; }
  @media (max-width:760px){ .intro-inner{ grid-template-columns:1fr; gap:18px; } }

  /* ---------- Menu section ---------- */
  .menu-section{
    max-width:1100px; margin:0 auto;
    padding:56px 20px 80px;
  }
  .menu-heading{ text-align:center; margin-bottom:30px; }
  .menu-heading .kicker{
    font-family:'Space Mono', monospace; font-size:0.78rem; letter-spacing:0.18em;
    text-transform:uppercase; color:var(--ember); display:block; margin-bottom:8px;
  }
  .menu-heading h2{
    font-style:italic; font-size:clamp(2rem,5vw,3rem); font-weight:600; color:var(--ink);
  }

  .menu-type-toggle{
    display:flex; justify-content:center; gap:0; margin:0 auto 26px;
    max-width:420px; border:2px solid var(--ink); border-radius:999px; overflow:hidden;
  }
  .menu-type-toggle button{
    flex:1; padding:12px 18px; border:none; background:var(--paper); color:var(--ink);
    font-family:'Fraunces', serif; font-weight:600; font-size:1rem; cursor:pointer;
    transition:background .2s ease, color .2s ease;
  }
  .menu-type-toggle button.active{ background:var(--ink); color:var(--cream); }

  .cat-tabs{
    display:flex; flex-wrap:wrap; justify-content:center; gap:8px;
    margin-bottom:36px;
  }
  .cat-tabs button{
    font-family:'Space Mono', monospace; font-size:0.78rem; letter-spacing:0.02em;
    padding:9px 16px; border-radius:999px; border:1.4px solid var(--paper-line);
    background:var(--paper-2); color:var(--ink); cursor:pointer;
    transition:all .18s ease;
  }
  .cat-tabs button:hover{ border-color:var(--ember); }
  .cat-tabs button.active{ background:var(--ember); border-color:var(--ember); color:var(--cream); }

  .ticket-grid{
    display:grid; grid-template-columns:repeat(2, 1fr); gap:22px;
  }
  @media (max-width:760px){ .ticket-grid{ grid-template-columns:1fr; } }

  .ticket{
    position:relative;
    background:var(--paper-2);
    border:1px solid var(--paper-line);
    border-radius:2px;
    padding:22px 22px 18px;
    box-shadow:var(--shadow);
    animation:cardIn .5s ease-out backwards;
  }
  .ticket::before{
    content:"";
    position:absolute; top:-9px; left:0; right:0; height:9px;
    background-image:
      linear-gradient(135deg, var(--paper) 50%, transparent 50%),
      linear-gradient(-135deg, var(--paper) 50%, transparent 50%);
    background-size:14px 14px;
    background-position:top left;
    background-repeat:repeat-x;
  }
  @keyframes cardIn{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .cat-title{
    font-style:italic; font-weight:600; color:var(--ink);
    font-size:1.5rem; margin-bottom:4px;
  }
  .cat-sub{
    font-family:'Space Mono', monospace; font-size:0.72rem; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--olive); margin-bottom:14px; display:block;
  }

  .item-row{
    display:flex; align-items:baseline; gap:8px;
    padding:10px 0;
    border-bottom:1px dashed var(--paper-line);
  }
  .item-row:last-child{ border-bottom:none; }
  .item-name{
    font-weight:600; font-size:0.98rem; color:var(--char); white-space:nowrap;
  }
  .item-leader{
    flex:1; border-bottom:2px dotted var(--paper-line); transform:translateY(-4px);
    min-width:14px;
  }
  .item-price{
    font-family:'Space Mono', monospace; font-weight:700; font-size:0.95rem; color:var(--ember-dark);
    white-space:nowrap;
  }
  .item-desc{
    flex:0 0 100%;
    font-size:0.85rem; line-height:1.45; color:#5b554a; margin-top:2px;
  }
  .item-row.wrap{ flex-wrap:wrap; }

  .menu-note{
    text-align:center; margin-top:28px; font-family:'Space Mono',monospace;
    font-size:0.8rem; color:#7a7263;
  }

  /* ---------- Gallery ---------- */
  .gallery-section{
    max-width:1100px; margin:0 auto;
    padding:10px 20px 70px;
  }
  .gallery-heading{ text-align:center; margin-bottom:30px; }
  .gallery-heading .kicker{
    font-family:'Space Mono', monospace; font-size:0.78rem; letter-spacing:0.18em;
    text-transform:uppercase; color:var(--ember); display:block; margin-bottom:8px;
  }
  .gallery-heading h2{
    font-style:italic; font-size:clamp(2rem,5vw,3rem); font-weight:600; color:var(--ink);
  }
  .gallery-grid{
    display:grid; grid-template-columns:repeat(4, 1fr); gap:18px;
  }
  @media (max-width:900px){ .gallery-grid{ grid-template-columns:repeat(2,1fr); } }
  @media (max-width:480px){ .gallery-grid{ grid-template-columns:1fr; } }
  .gallery-card{
    position:relative; overflow:hidden; border-radius:2px;
    aspect-ratio:4/5; box-shadow:var(--shadow);
  }
  .gallery-card img{
    width:100%; height:100%; object-fit:cover;
    transition:transform .4s ease;
  }
  .gallery-card:hover img{ transform:scale(1.06); }
  .gallery-card::after{
    content:""; position:absolute; inset:0;
    background:linear-gradient(180deg, transparent 50%, rgba(16,42,61,0.78) 100%);
  }
  .gallery-tag{
    position:absolute; left:12px; right:12px; bottom:10px; z-index:2;
    color:var(--cream); font-family:'Space Mono', monospace;
    font-size:0.74rem; letter-spacing:0.02em; line-height:1.3;
  }

  /* ---------- Reviews / atmosphere ---------- */
  .atmosphere{
    background:var(--ink);
    color:var(--cream);
  }
  .atmosphere-grid{
    display:grid; grid-template-columns:1fr 1.05fr;
    max-width:1100px; margin:0 auto;
  }
  .atmosphere-photo{
    position:relative; overflow:hidden; min-height:380px;
  }
  .atmosphere-photo img{
    width:100%; height:100%; object-fit:cover; object-position:center 38%;
    display:block;
  }
  .atmosphere-text{
    padding:56px 44px; display:flex; flex-direction:column; justify-content:center;
  }
  .atmosphere-text h2{ font-style:italic; color:var(--cream); font-size:clamp(1.8rem,4vw,2.6rem); margin-bottom:14px; }
  .atmosphere-text p{ max-width:480px; margin:0 0 10px; color:#D9E1E6; line-height:1.6; }
  @media (max-width:860px){
    .atmosphere-grid{ grid-template-columns:1fr; }
    .atmosphere-photo{ min-height:260px; }
    .atmosphere-text{ padding:40px 24px; }
  }

  /* ---------- Footer ---------- */
  footer{
    background:var(--ink-3);
    color:var(--cream);
    padding:50px 24px 30px;
  }
  .footer-inner{
    max-width:1100px; margin:0 auto;
    display:grid; grid-template-columns:1.3fr 1fr 1fr; gap:32px;
  }
  @media (max-width:760px){ .footer-inner{ grid-template-columns:1fr; gap:28px; } }
  footer h4{
    font-family:'Space Mono', monospace; font-size:0.78rem; letter-spacing:0.12em;
    text-transform:uppercase; color:#F2C9A6; margin-bottom:12px;
  }
  footer .brand{ color:var(--cream); margin-bottom:10px; }
  footer p, footer address{ font-size:0.92rem; line-height:1.7; color:#CBD5DA; margin:0 0 6px; font-style:normal; }
  footer a.link{ text-decoration:underline; text-decoration-color:var(--ember); }
  .footer-bottom{
    max-width:1100px; margin:34px auto 0; padding-top:18px;
    border-top:1px solid rgba(255,255,255,0.12);
    font-size:0.78rem; color:#7E919C; font-family:'Space Mono',monospace;
    display:flex; flex-wrap:wrap; justify-content:space-between; gap:8px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; scroll-behavior:auto !important; }
  }

  :focus-visible{ outline:3px solid var(--ember); outline-offset:2px; }
</style>
</head>

    {p:'8', es:{n:'Piña Colada', d:'Ron, crema de coco, zumo de piña, hielo.'}, en:{n:'Piña Colada', d:'Rum, coconut cream, pineapple juice, ice.'}},
    {p:'8', es:{n:'Negroni', d:'Ginebra, Campari, vermut rojo, hielo.'}, en:{n:'Negroni', d:'Gin, Campari, red vermouth, ice.'}},
    {p:'8', es:{n:'Espresso Martini', d:'Vodka, Kahlúa, café espresso, azúcar, hielo.'}, en:{n:'Espresso Martini', d:'Vodka, Kahlúa, espresso coffee, sugar, ice.'}},
    {p:'10', es:{n:'Porn Star Martini', d:'Vodka vainilla, Passoa, puré de maracuyá, lima, cava.'}, en:{n:'Porn Star Martini', d:'Vanilla vodka, Passoa, passion fruit purée, lime, cava.'}},
    {p:'8', es:{n:'Margarita', d:'Tequila, triple sec, zumo de lima, borde de sal, hielo.'}, en:{n:'Margarita', d:'Tequila, triple sec, lime juice, salted rim, ice.'}},
    {p:'8', es:{n:'Daikiri', d:'Ron blanco, zumo de lima, azúcar, hielo.'}, en:{n:'Daiquiri', d:'White rum, lime juice, sugar, ice.'}},
  ]},

/* ---------------- State + render ---------------- */
let lang = 'es';
let menuType = 'food';
let activeCat = FOOD[0].id;

function setLang(l){
  lang = l;
  document.documentElement.lang = l;
  document.getElementById('btn-es').classList.toggle('active', l==='es');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  applyStaticText();
  renderTabs();
  renderGrid();
}

function setType(type){
  menuType = type;
  document.getElementById('type-food').classList.toggle('active', type==='food');
  document.getElementById('type-drinks').classList.toggle('active', type==='drinks');
  const cats = type==='food' ? FOOD : DRINKS;
  activeCat = cats[0].id;
  renderTabs();
  renderGrid();
}

function applyStaticText(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.getAttribute('data-i18n');
    if(T[lang][key] !== undefined) el.textContent = T[lang][key];
  });
}

function renderTabs(){
  const cats = menuType==='food' ? FOOD : DRINKS;
  const wrap = document.getElementById('cat-tabs');
  wrap.innerHTML = '';
  cats.forEach(cat=>{
    const b = document.createElement('button');
    b.textContent = cat[lang];
    b.className = cat.id===activeCat ? 'active' : '';
    b.onclick = ()=>{ activeCat = cat.id; renderTabs(); renderGrid(); };
    wrap.appendChild(b);
  });
}

function renderGrid(){
  const cats = menuType==='food' ? FOOD : DRINKS;
  const cat = cats.find(c=>c.id===activeCat) || cats[0];
  const grid = document.getElementById('ticket-grid');
  grid.innerHTML = '';

  const ticket = document.createElement('div');
  ticket.className = 'ticket';
  ticket.style.gridColumn = '1 / -1';

  const title = document.createElement('h3');
  title.className = 'cat-title';
  title.textContent = cat[lang];
  ticket.appendChild(title);

  const sub = document.createElement('span');
  sub.className = 'cat-sub';
  sub.textContent = (lang==='es' ? 'Mr. Chef · carta' : 'Mr. Chef · menu');
  ticket.appendChild(sub);

  const innerGrid = document.createElement('div');
  innerGrid.style.display = 'grid';
  innerGrid.style.gridTemplateColumns = 'repeat(2, 1fr)';
  innerGrid.style.gap = '0 28px';

  cat.items.forEach((item, i)=>{
    const row = document.createElement('div');
    row.className = 'item-row wrap';

    const name = document.createElement('span');
    name.className = 'item-name';
    name.textContent = item[lang].n;

    const leader = document.createElement('span');
    leader.className = 'item-leader';

    const price = document.createElement('span');
    price.className = 'item-price';
    price.textContent = '\u20AC ' + item.p;

    row.appendChild(name);
    row.appendChild(leader);
    row.appendChild(price);

    if(item[lang].d){
      const desc = document.createElement('span');
      desc.className = 'item-desc';
      desc.textContent = item[lang].d;
      row.appendChild(desc);
    }
    innerGrid.appendChild(row);
  });

  ticket.appendChild(innerGrid);
  grid.appendChild(ticket);
}

/* ---------------- Responsive: single column inside ticket on small screens ---------------- */
function handleResize(){
  document.querySelectorAll('#ticket-grid .ticket > div').forEach(g=>{
    g.style.gridTemplateColumns = window.innerWidth < 640 ? '1fr' : 'repeat(2, 1fr)';
  });
}
window.addEventListener('resize', handleResize);

/* ---------------- Init ---------------- */
applyStaticText();
renderTabs();
renderGrid();
handleResize();
</script>
</body>
</html>
